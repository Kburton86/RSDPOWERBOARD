<style>
:root{--black:#0a0a0a;--surface:#111;--surface2:#191919;--surface3:#222;--border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.14);--text:#f0ede8;--muted:#7a7570;--s:#e8c840;--s-glow:rgba(232,200,64,0.2);--s-bg:rgba(232,200,64,0.08);--a:#e87c40;--a-glow:rgba(232,124,64,0.2);--a-bg:rgba(232,124,64,0.08);--b:#40b8e8;--b-glow:rgba(64,184,232,0.2);--b-bg:rgba(64,184,232,0.08);--c:#8888aa;--c-glow:rgba(136,136,170,0.16);--c-bg:rgba(136,136,170,0.06);}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--black);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;overflow-x:hidden;}
header{display:flex;align-items:center;justify-content:space-between;padding:16px 24px 12px;border-bottom:1px solid var(--border);background:var(--surface);position:sticky;top:0;z-index:100;gap:12px;flex-wrap:wrap;}
.header-left{display:flex;align-items:baseline;gap:12px;}
.logo{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:0.08em;color:var(--s);line-height:1;}
.logo span{color:var(--text);opacity:0.5;font-size:17px;}
.tag{font-size:10px;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted);border:1px solid var(--border2);border-radius:4px;padding:3px 8px;}
.header-controls{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
.search-wrap{position:relative;}
.search-wrap svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);opacity:0.35;pointer-events:none;}
input[type="text"]{background:var(--surface2);border:1px solid var(--border2);border-radius:8px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;padding:7px 12px 7px 30px;outline:none;width:190px;transition:border-color 0.2s;}
input[type="text"]:focus{border-color:var(--s);}
input[type="text"]::placeholder{color:var(--muted);}
select{background:var(--surface2);border:1px solid var(--border2);border-radius:8px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;padding:7px 10px;outline:none;cursor:pointer;}
.btn{background:var(--surface2);border:1px solid var(--border2);border-radius:8px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;padding:7px 13px;cursor:pointer;letter-spacing:0.02em;transition:background 0.15s,border-color 0.15s;white-space:nowrap;}
.btn:hover{background:var(--surface3);border-color:rgba(255,255,255,0.25);}
.btn-gold{background:var(--s);color:#1a1400;border-color:var(--s);font-weight:600;}
.btn-gold:hover{background:#f0d040;border-color:#f0d040;}
.stats-bar{display:flex;border-bottom:1px solid var(--border);background:var(--surface);}
.stat-item{padding:9px 20px;border-right:1px solid var(--border);text-align:center;flex:1;}
.stat-item:last-child{border-right:none;}
.stat-num{font-family:'Bebas Neue',sans-serif;font-size:21px;letter-spacing:0.05em;line-height:1;transition:all 0.3s;}
.stat-label{font-size:9px;font-weight:500;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);margin-top:2px;}
.board{display:grid;grid-template-columns:repeat(4,1fr);min-height:calc(100vh - 114px);}
.column{border-right:1px solid var(--border);display:flex;flex-direction:column;min-width:0;transition:background 0.15s;}
.column:last-child{border-right:none;}
.column.drag-over{background:rgba(255,255,255,0.025);}
.col-s.drag-over{background:var(--s-bg);} .col-a.drag-over{background:var(--a-bg);} .col-b.drag-over{background:var(--b-bg);} .col-c.drag-over{background:var(--c-bg);}
.col-header{padding:14px 14px 10px;border-bottom:1px solid var(--border);position:sticky;top:58px;z-index:10;background:var(--surface);}
.col-tier{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:0.1em;line-height:1;display:flex;align-items:center;gap:8px;}
.col-badge{display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:6px;font-size:14px;font-weight:900;}
.col-s .col-badge{background:var(--s-bg);color:var(--s);border:1px solid var(--s);}
.col-a .col-badge{background:var(--a-bg);color:var(--a);border:1px solid var(--a);}
.col-b .col-badge{background:var(--b-bg);color:var(--b);border:1px solid var(--b);}
.col-c .col-badge{background:var(--c-bg);color:var(--c);border:1px solid var(--c);}
.col-s .col-tier{color:var(--s);} .col-a .col-tier{color:var(--a);} .col-b .col-tier{color:var(--b);} .col-c .col-tier{color:var(--c);}
.col-subtitle{font-size:9px;font-weight:500;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);margin-top:2px;}
.col-count{font-size:11px;font-weight:600;font-family:'DM Mono',monospace;padding:2px 7px;border-radius:12px;margin-left:auto;border:1px solid var(--border2);color:var(--muted);}
.col-body{flex:1;padding:8px;display:flex;flex-direction:column;gap:6px;overflow-y:auto;min-height:80px;}
.col-body::-webkit-scrollbar{width:3px;}
.col-body::-webkit-scrollbar-thumb{background:var(--surface3);border-radius:2px;}
.drop-zone{border:1px dashed var(--border2);border-radius:10px;padding:18px;color:var(--muted);font-size:10px;letter-spacing:0.06em;text-transform:uppercase;text-align:center;pointer-events:none;display:none;}
.column.drag-over .drop-zone{display:block;}
.card{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 12px;cursor:grab;position:relative;overflow:hidden;transition:border-color 0.15s,background 0.15s,box-shadow 0.15s,transform 0.15s,opacity 0.15s;}
.card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:10px 0 0 10px;}
.col-s .card::before{background:var(--s);} .col-a .card::before{background:var(--a);} .col-b .card::before{background:var(--b);} .col-c .card::before{background:var(--c);}
.card:hover{border-color:var(--border2);background:var(--surface3);transform:translateY(-1px);}
.col-s .card:hover{border-color:rgba(232,200,64,0.3);box-shadow:0 3px 14px var(--s-glow);}
.col-a .card:hover{border-color:rgba(232,124,64,0.3);box-shadow:0 3px 14px var(--a-glow);}
.col-b .card:hover{border-color:rgba(64,184,232,0.3);box-shadow:0 3px 14px var(--b-glow);}
.col-c .card:hover{border-color:rgba(136,136,170,0.25);box-shadow:0 3px 14px var(--c-glow);}
.card.dragging{opacity:0.3;transform:scale(0.96);cursor:grabbing;box-shadow:none;}
.card.just-moved{animation:flashIn 0.45s ease;}
@keyframes flashIn{0%{transform:scale(1.04);opacity:0.6;}100%{transform:scale(1);opacity:1;}}
.drag-handle{position:absolute;top:9px;right:9px;opacity:0;transition:opacity 0.15s;color:var(--muted);font-size:13px;line-height:1;pointer-events:none;letter-spacing:1px;}
.card:hover .drag-handle{opacity:0.6;}
.card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:6px;margin-bottom:4px;}
.card-artist{font-size:13px;font-weight:600;color:var(--text);line-height:1.3;flex:1;padding-right:16px;}
.card-score{font-family:'Bebas Neue',sans-serif;font-size:19px;letter-spacing:0.06em;line-height:1;flex-shrink:0;transition:color 0.3s;}
.col-s .card-score{color:var(--s);} .col-a .card-score{color:var(--a);} .col-b .card-score{color:var(--b);} .col-c .card-score{color:var(--c);}
.card-title{font-size:11px;color:var(--muted);line-height:1.4;margin-bottom:6px;}
.card-meta{display:flex;align-items:center;gap:4px;flex-wrap:wrap;}
.badge{font-size:9px;font-weight:700;letter-spacing:0.07em;text-transform:uppercase;padding:2px 5px;border-radius:4px;}
.badge-E{background:rgba(232,200,64,0.12);color:#e8c840;border:1px solid rgba(232,200,64,0.28);}
.badge-L{background:rgba(232,124,64,0.12);color:#e87c40;border:1px solid rgba(232,124,64,0.28);}
.badge-F{background:rgba(64,184,232,0.12);color:#40b8e8;border:1px solid rgba(64,184,232,0.28);}
.badge-BB{background:rgba(184,124,220,0.12);color:#b87cdc;border:1px solid rgba(184,124,220,0.28);}
.card-run{font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);margin-left:auto;}
.score-flash-up{animation:sfUp 0.5s ease;}
.score-flash-dn{animation:sfDn 0.5s ease;}
@keyframes sfUp{0%{transform:scale(1.5);color:#6fff90;}100%{transform:scale(1);}}
@keyframes sfDn{0%{transform:scale(1.5);color:#ff6060;}100%{transform:scale(1);}}
.toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%) translateY(16px);background:var(--surface3);border:1px solid var(--border2);border-radius:10px;padding:9px 18px;font-size:13px;color:var(--text);opacity:0;transition:opacity 0.22s,transform 0.22s;z-index:500;white-space:nowrap;pointer-events:none;display:flex;align-items:center;gap:8px;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.toast-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:300;display:none;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(4px);}
.modal-overlay.open{display:flex;}
.modal{background:var(--surface);border:1px solid var(--border2);border-radius:16px;width:100%;max-width:460px;padding:26px;position:relative;animation:mIn 0.18s ease;}
@keyframes mIn{from{opacity:0;transform:translateY(8px) scale(0.98);}to{opacity:1;transform:none;}}
.modal-close{position:absolute;top:14px;right:14px;background:var(--surface2);border:1px solid var(--border2);border-radius:6px;color:var(--muted);cursor:pointer;font-size:15px;width:28px;height:28px;display:flex;align-items:center;justify-content:center;transition:background 0.15s;}
.modal-close:hover{background:var(--surface3);color:var(--text);}
.modal-tier-tag{font-size:10px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;margin-bottom:7px;}
.modal-artist{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:0.04em;line-height:1.1;margin-bottom:3px;}
.modal-rec-title{font-size:13px;color:var(--muted);margin-bottom:16px;line-height:1.5;}
.modal-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px;}
.modal-row:last-of-type{border-bottom:none;}
.modal-row-lbl{color:var(--muted);font-size:10px;font-weight:500;letter-spacing:0.06em;text-transform:uppercase;}
.modal-row-val{font-weight:600;font-family:'DM Mono',monospace;font-size:12px;}
.modal-note{margin-top:14px;padding:11px 13px;background:var(--surface2);border-radius:8px;font-size:12px;color:var(--muted);line-height:1.6;border-left:3px solid var(--border2);}
.modal-score-big{font-family:'Bebas Neue',sans-serif;font-size:50px;letter-spacing:0.05em;line-height:1;float:right;}
.modal-picker-label{font-size:10px;font-weight:500;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);margin-top:16px;margin-bottom:7px;}
.modal-picker{display:flex;gap:8px;}
.tier-btn{flex:1;padding:8px 4px;border-radius:8px;border:1px solid var(--border2);background:var(--surface2);color:var(--muted);font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:0.08em;cursor:pointer;transition:all 0.15s;text-align:center;}
.tier-btn:hover{background:var(--surface3);color:var(--text);}
.tier-btn.aS{background:var(--s-bg);color:var(--s);border-color:var(--s);}
.tier-btn.aA{background:var(--a-bg);color:var(--a);border-color:var(--a);}
.tier-btn.aB{background:var(--b-bg);color:var(--b);border-color:var(--b);}
.tier-btn.aC{background:var(--c-bg);color:var(--c);border-color:var(--c);}
.no-results{color:var(--muted);font-size:11px;text-align:center;padding:24px 8px;letter-spacing:0.04em;}
@media(max-width:900px){.board{grid-template-columns:repeat(2,1fr);}.column:nth-child(2){border-right:none;}.column:nth-child(3){border-top:1px solid var(--border);}}
@media(max-width:540px){.board{grid-template-columns:1fr;}.column{border-right:none;border-bottom:1px solid var(--border);}input[type="text"]{width:130px;}}
</style>
</head>

var TIERS=['S','A','B','C'];
var TC={S:'#e8c840',A:'#e87c40',B:'#40b8e8',C:'#8888aa'};
var TL={S:'S TIER — Elite Potential',A:'A TIER — High Potential',B:'B TIER — Medium Potential',C:'C TIER — Low Potential'};
var RANGES={S:[78,97],A:[57,77],B:[37,56],C:[20,36]};
var activeFilter='all', searchTerm='', dragId=null, openId=null, toastTmr;

function recalc(){
  TIERS.forEach(function(t){
    var items=R.filter(function(r){return r.tier===t;}).sort(function(a,b){return b.score-a.score;});
    var lo=RANGES[t][0],hi=RANGES[t][1];
    if(!items.length)return;
    if(items.length===1){items[0].score=Math.round((lo+hi)/2);return;}
    var span=hi-lo;
    items.forEach(function(r,i){r.score=Math.round(hi-(i/(items.length-1))*span);});
  });
}

function getFiltered(){
  return R.filter(function(r){
    var tok=activeFilter==='all'||(activeFilter==='BB'?r.bb:r.type===activeFilter);
    var sok=!searchTerm||r.artist.toLowerCase().includes(searchTerm)||r.title.toLowerCase().includes(searchTerm);
    return tok&&sok;
  });
}

function badge(cls,lbl){return '<span class="badge badge-'+cls+'">'+lbl+'</span>';}
function typeLbl(t){return t==='E'?'RSD Exclusive':t==='L'?'Limited / Regional':'RSD First';}
function runStr(n){return n?n.toLocaleString()+' copies':'Unknown';}

function renderBoard(flashId,dir){
  var filtered=getFiltered();
  // stats
  var sb='';
  TIERS.forEach(function(t){
    var n=R.filter(function(r){return r.tier===t;}).length;
    var lbls={S:'S Tier Grails',A:'A Tier Picks',B:'B Tier Solid',C:'C Tier Watch'};
    sb+='<div class="stat-item"><div class="stat-num" style="color:'+TC[t]+'">'+n+'</div><div class="stat-label">'+lbls[t]+'</div></div>';
  });
  sb+='<div class="stat-item" style="border-right:none"><div class="stat-num">'+R.length+'</div><div class="stat-label">Total Ranked</div></div>';
  document.getElementById('statsBar').innerHTML=sb;

  TIERS.forEach(function(t){
    var rows=filtered.filter(function(r){return r.tier===t;}).sort(function(a,b){return b.score-a.score;});
    document.getElementById('count-'+t).textContent=rows.length;
    var html='<div class="drop-zone">Drop here to move to '+t+' Tier</div>';
    if(!rows.length){html+='<div class="no-results">No cards in this tier</div>';}
    rows.forEach(function(r){
      var runTxt=r.run?r.run.toLocaleString():'—';
      var moved=r.id===flashId?' just-moved':'';
      var sfc=r.id===flashId?(dir==='up'?' score-flash-up':' score-flash-dn'):'';
      html+='<div class="card'+moved+'" id="card-'+r.id+'" draggable="true" ondragstart="dStart(event,'+r.id+')" ondragend="dEnd(event)" onclick="openModal('+r.id+')" title="Drag to move between tiers · Click for details">'+
        '<span class="drag-handle">&#8942;&#8942;</span>'+
        '<div class="card-top"><div class="card-artist">'+r.artist+'</div><div class="card-score'+sfc+'">'+r.score+'</div></div>'+
        '<div class="card-title">'+r.title+'</div>'+
        '<div class="card-meta">'+badge(r.type,r.type==='E'?'Exclusive':r.type==='L'?'Limited':'RSD First')+(r.bb?badge('BB','Billboard'):'')+
        '<div class="card-run">'+runTxt+'</div></div>'+
      '</div>';
    });
    document.getElementById('body-'+t).innerHTML=html;
  });
  if(openId!==null)populateModal(openId);
}

// drag
function dStart(e,id){
  dragId=id;
  e.dataTransfer.effectAllowed='move';
  e.dataTransfer.setData('text/plain',String(id));
  setTimeout(function(){var el=document.getElementById('card-'+id);if(el)el.classList.add('dragging');},0);
}
function dEnd(e){
  if(dragId!==null){var el=document.getElementById('card-'+dragId);if(el)el.classList.remove('dragging');}
  dragId=null;
  document.querySelectorAll('.column').forEach(function(c){c.classList.remove('drag-over');});
}

document.querySelectorAll('.column').forEach(function(col){
  col.addEventListener('dragover',function(e){
    e.preventDefault();
    e.dataTransfer.dropEffect='move';
    document.querySelectorAll('.column').forEach(function(c){c.classList.remove('drag-over');});
    col.classList.add('drag-over');
  });
  col.addEventListener('dragleave',function(e){if(!col.contains(e.relatedTarget))col.classList.remove('drag-over');});
  col.addEventListener('drop',function(e){
    e.preventDefault();
    col.classList.remove('drag-over');
    var id=parseInt(e.dataTransfer.getData('text/plain'),10);
    if(isNaN(id))return;
    moveTo(id,col.getAttribute('data-tier'));
  });
});

function moveTo(id,newTier){
  var r=R.find(function(x){return x.id===id;});
  if(!r||r.tier===newTier)return;
  var oldTier=r.tier;
  r.tier=newTier;
  var dir=TIERS.indexOf(newTier)<TIERS.indexOf(oldTier)?'up':'dn';
  recalc();
  renderBoard(id,dir);
  showToast(r.artist+' moved to '+newTier+' Tier',TC[newTier]);
}

// modal
function populateModal(id){
  var r=R.find(function(x){return x.id===id;});
  if(!r)return;
  document.getElementById('m-tier').style.color=TC[r.tier];
  document.getElementById('m-tier').textContent=TL[r.tier];
  document.getElementById('m-artist').textContent=r.artist;
  document.getElementById('m-title').textContent=r.title;
  document.getElementById('m-score').style.color=TC[r.tier];
  document.getElementById('m-score').textContent=r.score;
  document.getElementById('m-rows').innerHTML=
    '<div class="modal-row"><span class="modal-row-lbl">Type</span><span class="modal-row-val">'+typeLbl(r.type)+'</span></div>'+
    '<div class="modal-row"><span class="modal-row-lbl">Billboard Artist</span><span class="modal-row-val">'+(r.bb?'Yes ✓':'No')+'</span></div>'+
    '<div class="modal-row"><span class="modal-row-lbl">US Press Run</span><span class="modal-row-val">'+runStr(r.run)+'</span></div>'+
    '<div class="modal-row"><span class="modal-row-lbl">Resell Score</span><span class="modal-row-val" style="color:'+TC[r.tier]+'">'+r.score+' / 100</span></div>';
  document.getElementById('m-note').textContent=r.note;
  var p='';
  TIERS.forEach(function(t){p+='<button class="tier-btn'+(r.tier===t?' a'+t:'')+'" onclick="modalMove('+id+',\''+t+'\')">'+t+' Tier</button>';});
  document.getElementById('m-picker').innerHTML=p;
}

function openModal(id){openId=id;populateModal(id);document.getElementById('modalOverlay').classList.add('open');}
function closeModal(){document.getElementById('modalOverlay').classList.remove('open');openId=null;}
function modalMove(id,tier){closeModal();moveTo(id,tier);}

document.getElementById('modalClose').onclick=closeModal;
document.getElementById('modalOverlay').addEventListener('click',function(e){if(e.target===this)closeModal();});
document.addEventListener('keydown',function(e){if(e.key==='Escape')closeModal();});

// toast
function showToast(msg,color){
  document.getElementById('tmsg').textContent=msg;
  document.getElementById('tdot').style.background=color;
  var el=document.getElementById('toast');
  el.classList.add('show');
  clearTimeout(toastTmr);
  toastTmr=setTimeout(function(){el.classList.remove('show');},2400);
}

// filters
document.getElementById('searchInput').addEventListener('input',function(){searchTerm=this.value.toLowerCase();renderBoard();});
document.getElementById('filterType').addEventListener('change',function(){activeFilter=this.value;renderBoard();});

function resetTiers(){R.forEach(function(r){r.tier=r.orig;});recalc();renderBoard();showToast('Board reset to original rankings','#7a7570');}

function exportCSV(){
  var sorted=R.slice().sort(function(a,b){return b.score-a.score;});
  var rows=[['Rank','Artist','Title','Type','Billboard Artist','US Press Run','Resell Score','Tier','Analysis']];
  sorted.forEach(function(r,i){
    rows.push([i+1,'"'+r.artist.replace(/"/g,'""')+'"','"'+r.title.replace(/"/g,'""')+'"',typeLbl(r.type),r.bb?'Yes':'No',r.run?r.run:'Unknown',r.score,r.tier+' TIER','"'+(r.note||'').replace(/"/g,'""')+'"']);
  });
  var csv=rows.map(function(r){return r.join(',');}).join('\n');
  var a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));
  a.download='Grailz_RSD_2026_Power_Board.csv';
  a.click();
}

recalc();
renderBoard();
</script>
